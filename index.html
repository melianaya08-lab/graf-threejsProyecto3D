<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Alien Runner 3D</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    font-family: Arial, sans-serif;
    background: #050505;
}

/* LOADING */
#loading {
    position: fixed;
    width: 100%;
    height: 100%;
    background: black;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 20px;
    z-index: 9999;
}

/* MENU */
#startScreen {
    position: absolute;
    width: 100%;
    height: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
    background: radial-gradient(circle, #1a0000, #000 80%);
    z-index: 20;
}

.panel {
    width: 850px;
    background: rgba(10, 10, 10, 0.95);
    border: 2px solid #ff0000;
    box-shadow: 0 0 40px red;
    padding: 25px;
    display: flex;
}

.menu {
    width: 35%;
    border-right: 1px solid red;
    padding-right: 15px;
}

.btn {
    width: 100%;
    padding: 12px;
    margin: 12px 0;
    background: #1a0000;
    color: #fff;
    border: 1px solid red;
    cursor: pointer;
    font-weight: bold;
}

/* GAME */
#container {
    position: absolute;
    width: 100%;
    height: 100%;
}

#ui-container {
    display: none;
    position: absolute;
    top: 20px;
    left: 20px;
    z-index: 10;
    color: white;
    background: rgba(0,0,0,0.6);
    padding: 15px 25px;
    border-radius: 10px;
}

#game-over {
    display: none;
    position: absolute;
    width: 100vw;
    height: 100vh;
    background: rgba(0,0,0,0.85);
    z-index: 30;
    color: white;
    justify-content: center;
    align-items: center;
    flex-direction: column;
}
</style>
</head>

<body>

<!-- LOADING -->
<div id="loading">Cargando Alien Runner...</div>

<!-- MENU -->
<div id="startScreen">
    <div class="panel">
        <div class="menu">
            <button class="btn" id="startBtn">START</button>
        </div>
    </div>
</div>

<div id="container"></div>

<div id="ui-container">
    <h2 id="texto-distancia">Metros: 0</h2>
    <div style="width:150px;height:7px;background:#444;">
        <div id="barra-vida" style="width:100%;height:100%;background:red;"></div>
    </div>
</div>

<div id="game-over">
    <h1>GAME OVER</h1>
</div>

<script type="importmap">
{
    "imports": {
        "three": "https://unpkg.com/three@0.155.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.155.0/examples/jsm/"
    }
}
</script>

<script type="module" src="js/main.js"></script>

<script>
document.getElementById('startBtn').addEventListener('click', () => {
    document.getElementById('startScreen').style.display = 'none';
    document.getElementById('ui-container').style.display = 'block';
    window.dispatchEvent(new Event('iniciarJuego'));
});
</script>

</body>
</html>
