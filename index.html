<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Alien Runner 3D</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    font-family: Arial, sans-serif;
    background: #050505;
}

/* FONDO */
#startScreen {
    position: absolute;
    width: 100%;
    height: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
    background: radial-gradient(circle, #1a0000, #000 80%);
    z-index: 20;
}

/* PANEL */
.panel {
    width: 850px;
    background: rgba(10, 10, 10, 0.95);
    border: 2px solid #ff0000;
    box-shadow: 0 0 40px red;
    padding: 25px;
    display: flex;
}

/* MENU */
.menu {
    width: 35%;
    border-right: 1px solid red;
    padding-right: 15px;
}

/* BOTONES */
.btn {
    position: relative;
    display: block;
    width: 100%;
    padding: 12px;
    margin: 12px 0;
    background: #1a0000;
    color: #fff;
    border: 1px solid red;
    cursor: pointer;
    font-weight: bold;
    letter-spacing: 1px;
    transition: 0.3s;
    overflow: hidden;
}

.btn::before {
    content: "";
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(90deg, transparent, red, transparent);
    transition: 0.4s;
}

.btn:hover::before {
    left: 100%;
}

.btn:hover {
    background: #330000;
    box-shadow: 0 0 15px red;
}

/* CONTENIDO */
.content {
    width: 65%;
    padding-left: 20px;
    color: #ddd;
}

/* TITULO */
.title {
    font-size: 32px;
    font-weight: 900;
    text-align: center;
    color: #ff3b3b;
    letter-spacing: 2px;
    text-shadow:
        0 0 5px #ff0000,
        0 0 10px #ff0000,
        0 0 20px #ff0000,
        0 0 40px #ff0000;
    margin-bottom: 10px;
}

/* TEXTO */
.desc {
    text-align: center;
    color: #ff8080;
    text-shadow:
        0 0 3px #f3f2f2,
        0 0 6px #d84343;
    margin-top: 10px;
}

/* SECCIONES */
.section {
    display: none;
}

.active {
    display: block;
}

/* GIF */
.homeImg {
    max-width: 300px;
    width: 100%;
    height: auto;
    display: block;
    margin: 15px auto;
}

/* GAME */
#container {
    position: absolute;
    width: 100%;
    height: 100%;
}
</style>
</head>

<body>

<div id="startScreen">
    <div class="panel">
        <div class="menu">
            <button class="btn" onclick="showSection('home')">HOME</button>
            <button class="btn" id="startBtn">START</button>
            <button class="btn" onclick="showSection('credits')">CREDITS</button>
            <button class="btn" onclick="showSection('help')">HELP</button>
            <button class="btn" onclick="exitGame()">EXIT</button>
        </div>

        <div class="content">
            <div id="home" class="section active">
                <div class="title">ALIEN RUNNER</div>
                <p class="desc">Sobrevive a la invasión alienígena</p>
                <img src="textures/alienInicio.jpg" class="homeImg">
            </div>

            <div id="credits" class="section">
                <div class="title">CRÉDITOS</div>
                <p class="desc">Nelida Yareni Cruz Perez - 23200824</p>
                <p class="desc">Melina Villa Anaya - 23200906</p>
                <p class="desc">Carrera: Ing. Sistemas Computacionales</p>
                <p class="desc">Materia: Graficación</p>
            </div>

            <div id="help" class="section">
                <div class="title">CONTROLES</div>
                <p class="desc">A / D → Cambiar carril</p>
                <p class="desc">ESPACIO → Saltar</p>
                <p class="desc">K → Patear</p>
            </div>
        </div>
    </div>
</div>

<div id="container"></div>

<div id="ui-container" style="display: none; position: absolute; top: 20px; left: 20px; z-index: 10; color: white; font-family: sans-serif; background-color: rgba(0, 0, 0, 0.6); padding: 15px 25px; border-radius: 10px;">
    <h2 id="texto-distancia" style="margin: 0 0 10px 0; font-size: 1rem;">Metros: 0</h2>
    
    <div style="width: 150px; height: 7px; background-color: #444; border-radius: 4px; overflow: hidden;">
        <div id="barra-vida" style="width: 100%; height: 100%; background-color: #ff3333; transition: width 0.3s ease;"></div>
    </div>
</div>

<div id="game-over" style="display: none; position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; background-color: rgba(0, 0, 0, 0.85); z-index: 30; color: white; font-family: sans-serif; flex-direction: column; justify-content: center; align-items: center;">
    <h1 style="font-size: 5rem; color: #ff3333; margin: 0;">GAME OVER</h1>
    <h2 id="puntaje-final" style="font-size: 1.5rem; margin: 20px 0;">Metros recorridos: 0</h2>
    <button onclick="location.reload()" style="padding: 15px 30px; font-size: 1.2rem; background-color: white; color: black; border: none; border-radius: 10px; cursor: pointer; font-weight: bold;">JUGAR DE NUEVO</button>
</div>

<script type="importmap">
{
    "imports": {
        "three": "https://unpkg.com/three@0.155.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.155.0/examples/jsm/"
    }
}
</script>

<script type="module" src="js/main.js"></script>

<script>
// Manejo de las pestañas del menú
function showSection(id){
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}

function exitGame(){
    alert("Gracias por jugar 👽");
}

// NUEVO: Lógica del botón START
document.getElementById('startBtn').addEventListener('click', () => {
    // 1. Ocultamos el menú principal
    document.getElementById('startScreen').style.display = 'none';
    
    // 2. Mostramos la barra de vida y distancia
    document.getElementById('ui-container').style.display = 'block';

    //Enviamos una señal a main.js para que arranque todo
    window.dispatchEvent(new Event('iniciarJuego'));
});
</script>

</body>
</html>
