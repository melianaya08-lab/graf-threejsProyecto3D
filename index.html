<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>Alien Runner 3D</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<div id="startScreen">

    <div class="panel">

        <div class="menu">

            <button class="btn"
            onclick="showSection('home')">
                HOME
            </button>

            <button class="btn"
            id="startBtn">
                START
            </button>

            <button class="btn"
            onclick="showSection('credits')">
                CREDITS
            </button>

            <button class="btn"
            onclick="showSection('help')">
                HELP
            </button>

            <button class="btn"
            onclick="exitGame()">
                EXIT
            </button>

        </div>

        <div class="content">

            <div id="home"
            class="section active">

                <div class="title">
                    ALIEN RUNNER
                </div>

                <p class="desc">
                    Sobrevive a la invasión alienígena
                </p>

                <img src="textures/alienInicio.jpg"
                class="homeImg">

            </div>

            <div id="credits"
            class="section">

                <div class="title">
                    CRÉDITOS
                </div>

                <p class="desc">
                    Nelida Yareni Cruz Perez - 23200824
                </p>

                <p class="desc">
                    Melina Villa Anaya - 23200906
                </p>

                <p class="desc">
                    Materia: Graficación
                </p>

            </div>

            <div id="help"
            class="section">

                <div class="title">
                    CONTROLES
                </div>

                <p class="desc">
                    A / D → Cambiar carril
                </p>

                <p class="desc">
                    ESPACIO → Saltar
                </p>

                <p class="desc">
                    K → Patear
                </p>

            </div>

        </div>

    </div>

</div>

<div id="container"></div>

<!-- HUD -->
<div id="ui-container">

    <h2 id="texto-distancia">
        Metros: 0
    </h2>

    <div id="vida-ui">

        <div id="corazon">
            ❤️
        </div>

        <div id="contenedor-vida">

            <div id="barra-vida"></div>

        </div>

    </div>

</div>

<!-- GAME OVER -->
<div id="game-over">

    <h1>
        GAME OVER
    </h1>

    <h2 id="puntaje-final">
        Metros recorridos: 0
    </h2>

    <button id="btn-restart"
    onclick="location.reload()">

        JUGAR DE NUEVO

    </button>

</div>

<script type="importmap">
{
    "imports": {
        "three": "https://unpkg.com/three@0.152.2/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.152.2/examples/jsm/"
    }
}
</script>

<script type="module"
src="js/main.js"></script>

<script>

function showSection(id){

    document.querySelectorAll('.section')
    .forEach(s => s.classList.remove('active'));

    document.getElementById(id)
    .classList.add('active');
}

function exitGame(){

    alert("Gracias por jugar 👽");
}

document.getElementById('startBtn')
.addEventListener('click', () => {

    document.getElementById('startScreen')
    .style.display = 'none';

    document.getElementById('ui-container')
    .style.display = 'block';

    window.dispatchEvent(
        new Event('iniciarJuego')
    );
});

</script>

</body>
</html>
